<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>J.A.R.V.I.S — MARK XLVIII</title>
  <script src="/static/crypto.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #00060a;
      --panel: #010d14;
      --border: #0d3347;
      --border-b: #1a5c7a;
      --pri: #00d4ff;
      --pri-dim: #007a99;
      --acc: #ff6b00;
      --acc2: #ffcc00;
      --green: #00ff88;
      --red: #ff3355;
      --text: #8ffcff;
      --text-dim: #3a8a9a;
      --font: "Courier New", Courier, monospace;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-size: 12px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 25px;
      border-bottom: 1px solid var(--border);
    }
    .h-left { color: var(--pri-dim); font-weight: bold; width: 200px; }
    .h-center { text-align: center; flex: 1; }
    .h-center h1 { color: var(--pri); font-size: 24px; letter-spacing: 5px; font-weight: bold; margin-bottom: 5px; }
    .h-center .sub { color: var(--pri-dim); font-size: 10px; letter-spacing: 2px; }
    .h-right { text-align: right; width: 200px; }
    #clock { font-size: 20px; color: var(--pri); font-weight: bold; letter-spacing: 2px; }
    #date { font-size: 10px; color: var(--pri-dim); margin-top: 5px; }

    .main {
      display: flex;
      flex: 1;
      padding: 15px;
      gap: 15px;
      overflow: hidden;
    }

    /* Left Panel */
    .left-panel {
      width: 220px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      border: 1px solid var(--border);
      padding: 15px;
      border-radius: 4px;
    }
    .panel-title {
      font-size: 10px;
      color: var(--pri);
      font-weight: bold;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 10px;
    }
    .panel-title::before { content: '◆'; }
    .metric {
      border: 1px solid var(--border);
      background: var(--panel);
      padding: 8px 12px;
      border-radius: 4px;
      position: relative;
    }
    .m-top {
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px;
      font-size: 11px;
      font-weight: bold;
    }
    .m-lbl { color: var(--pri-dim); }
    .m-val { color: var(--red); }
    .m-val.green { color: var(--green); }
    .m-bar-bg {
      height: 4px;
      background: #011520;
      border-radius: 2px;
      overflow: hidden;
    }
    .m-bar {
      height: 100%;
      background: var(--red);
      width: 0%;
      transition: width 0.3s;
    }
    .m-bar.green { background: var(--green); }
    
    .stats {
      border: 1px solid var(--border);
      background: var(--panel);
      padding: 15px;
      border-radius: 4px;
      color: var(--pri-dim);
      font-weight: bold;
      line-height: 1.8;
      font-size: 11px;
    }
    .stats span { color: var(--pri); margin-left: 10px; }
    .stats-red { color: var(--acc2) !important; }

    .bottom-status {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .b-box {
      border: 1px solid var(--border);
      padding: 8px;
      text-align: center;
      font-size: 9px;
      color: var(--pri-dim);
      border-radius: 2px;
    }
    .b-box.active { color: var(--green); border-color: var(--green); }

    /* Center Panel */
    .center-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .hud-container {
      position: relative;
      width: 300px;
      height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hud-ring {
      position: absolute;
      border-radius: 50%;
      border: 2px solid var(--pri);
      animation: spin 8s linear infinite;
    }
    .hud-ring.r1 { inset: 0; border-width: 1px; opacity: 0.3; border-style: dashed; }
    .hud-ring.r2 { inset: 20px; border-width: 2px; opacity: 0.5; animation-direction: reverse; animation-duration: 6s; }
    .hud-ring.r3 { inset: 50px; border-width: 3px; opacity: 0.8; border-color: var(--pri-dim); }
    .hud-center {
      text-align: center;
      z-index: 10;
    }
    .hud-title {
      font-size: 18px;
      font-weight: bold;
      color: var(--pri);
      letter-spacing: 2px;
    }
    .hud-status {
      margin-top: 15px;
      font-size: 14px;
      font-weight: bold;
      color: var(--acc);
      letter-spacing: 2px;
    }
    .hud-status.listening { color: var(--green); }
    .hud-status.thinking { color: var(--acc2); }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    
    .waveform {
      display: flex;
      gap: 5px;
      height: 30px;
      align-items: flex-end;
      position: absolute;
      bottom: 50px;
    }
    .bar {
      width: 8px;
      height: 4px;
      background: var(--pri-dim);
      transition: height 0.1s;
    }

    /* Right Panel */
    .right-panel {
      width: 380px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .chat-box {
      flex: 1;
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 4px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
      font-size: 11px;
      min-height: 200px;
    }
    .msg { padding: 5px 0; word-wrap: break-word; }
    .msg-j { color: var(--pri); }
    .msg-u { color: var(--text-dim); }
    .msg-sys { color: var(--acc2); font-style: italic; }
    
    .file-drop {
      border: 1px dashed var(--border);
      background: var(--panel);
      padding: 20px;
      text-align: center;
      border-radius: 4px;
      color: var(--pri-dim);
      font-size: 10px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .file-drop:hover { border-color: var(--pri); color: var(--pri); }
    .file-drop-icon { font-size: 24px; color: var(--pri); margin-bottom: 5px; }

    .cmd-box {
      display: flex;
      border: 1px solid var(--border);
      background: var(--panel);
      padding: 5px;
    }
    #inp {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: var(--font);
      outline: none;
      padding: 5px;
    }
    .cmd-btn {
      background: var(--border);
      color: var(--pri);
      border: none;
      padding: 5px 15px;
      cursor: pointer;
      font-family: var(--font);
    }
    
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--pri-dim);
      padding: 10px;
      font-family: var(--font);
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:hover { background: #011520; }
    .btn-red { color: var(--red); border-color: rgba(255,51,85,0.4); }
    .btn-red:hover { background: rgba(255,51,85,0.1); }
    .btn-green { color: var(--green); border-color: rgba(0,255,136,0.4); }
    .btn-green:hover { background: rgba(0,255,136,0.1); }
    .btn-blue { color: var(--pri); border-color: rgba(0,212,255,0.4); }
    .btn-blue:hover { background: rgba(0,212,255,0.1); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border-b); }

    #toast {
      position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
      background: rgba(0, 255, 136, 0.1); border: 1px solid var(--green);
      color: var(--green); padding: 5px 15px; font-weight: bold;
      opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    #toast.show { opacity: 1; }
    
    /* Media Query to Stack Layout on Mobile */
    @media (max-width: 900px) {
      .main {
        flex-direction: column;
        overflow-y: auto;
      }
      .left-panel, .center-panel, .right-panel {
        width: 100%;
        min-height: auto;
      }
      .waveform {
        position: relative;
        bottom: 0;
        margin-top: 20px;
      }
    }
  </style>
</head>
<body>
  <div id="toast"></div>
  <header>
    <div class="h-left">MARK XLVIII</div>
    <div class="h-center">
      <h1>J.A.R.V.I.S</h1>
      <div class="sub">Just A Rather Very Intelligent System</div>
    </div>
    <div class="h-right">
      <div id="clock">--:--:--</div>
      <div id="date">---</div>
    </div>
  </header>

  <div class="main">
    <!-- LEFT PANEL -->
    <div class="left-panel">
      <div class="panel-title">SYS MONITOR</div>
      
      <div class="metric">
        <div class="m-top"><div class="m-lbl">CPU</div><div class="m-val" id="cpuVal">--%</div></div>
        <div class="m-bar-bg"><div class="m-bar" id="cpuBar"></div></div>
      </div>
      
      <div class="metric">
        <div class="m-top"><div class="m-lbl">MEM</div><div class="m-val" id="ramVal">--%</div></div>
        <div class="m-bar-bg"><div class="m-bar" id="ramBar"></div></div>
      </div>
      
      <div class="metric">
        <div class="m-top"><div class="m-lbl">NET</div><div class="m-val green">5KB/s</div></div>
        <div class="m-bar-bg"><div class="m-bar green" style="width: 20%;"></div></div>
      </div>
      
      <div class="metric">
        <div class="m-top"><div class="m-lbl">GPU</div><div class="m-val" id="gpuVal">N/A</div></div>
        <div class="m-bar-bg"><div class="m-bar" id="gpuBar"></div></div>
      </div>
      
      <div class="metric">
        <div class="m-top"><div class="m-lbl">TMP</div><div class="m-val" id="cpuTemp">N/A</div></div>
        <div class="m-bar-bg"><div class="m-bar" style="width: 0%;"></div></div>
      </div>

      <div class="stats">
        UP &nbsp;&nbsp;&nbsp;<span id="uptimeVal">--:--</span><br>
        PROC &nbsp;<span id="procVal">---</span><br>
        OS &nbsp;&nbsp;&nbsp;<span class="stats-red">WIN</span>
      </div>

      <div class="bottom-status">
        <div class="b-box active">AI CORE<br>ACTIVE</div>
        <div class="b-box">SEC<br>CLEARED</div>
        <div class="b-box">PROTOCOL<br>XLVIII</div>
      </div>
    </div>

    <!-- CENTER PANEL -->
    <div class="center-panel">
      <div class="hud-container">
        <div class="hud-ring r1"></div>
        <div class="hud-ring r2"></div>
        <div class="hud-ring r3"></div>
        <div class="hud-center">
          <div class="hud-title">J.A.R.V.I.S</div>
          <div class="hud-status" id="hudStatus">● EM ESPERA</div>
        </div>
      </div>
      
      <div class="waveform" id="waveform">
        <!-- JS generated bars -->
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">
      <div class="panel-title" style="margin-bottom: 0;">▶ ACTIVITY LOG</div>
      <div class="chat-box" id="chatFeed"></div>
      
      <div class="panel-title" style="margin-bottom: 0; margin-top: 5px;">▶ FILE UPLOAD</div>
      <input type="file" id="file-inp" multiple accept="*/*" style="display:none">
      <label class="file-drop" for="file-inp" id="fileDrop">
        <div class="file-drop-icon">↑</div>
        Drop file here or Click to Browse<br>
        <span style="font-size:8px; opacity:0.5;">Images - Video - Audio - PDF - Docs - Code - Data</span>
      </label>

      <div class="panel-title" style="margin-bottom: 0; margin-top: 5px;">▶ COMMAND INPUT</div>
      <div class="cmd-box">
        <input type="text" id="inp" placeholder="Type a command or question..." autocomplete="off">
        <button class="cmd-btn" onclick="doSend()">▶</button>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-red" id="wake" onclick="doWake()">⚠️ WAKE [ESC]</button>
        <button class="btn btn-green" id="mic-btn" onclick="doMic()">🎤 MICROPHONE</button>
        <button class="btn btn-blue" onclick="doControl('show_desktop')">⚙ REMOTE CONTROL</button>
      </div>
    </div>
  </div>

  <script>
    // --- Clock ---
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent = now.toTimeString().split(' ')[0];
      document.getElementById('date').textContent = now.toDateString();
    }
    setInterval(updateClock, 1000); updateClock();

    // --- Waveform ---
    const wf = document.getElementById('waveform');
    for(let i=0; i<30; i++) {
      let b = document.createElement('div');
      b.className = 'bar';
      wf.appendChild(b);
    }
    let isSpeaking = false;
    setInterval(() => {
      const bars = wf.children;
      for(let i=0; i<bars.length; i++) {
        let h = isSpeaking ? (Math.random() * 25 + 5) : (Math.sin(Date.now()*0.005 + i) * 3 + 4);
        bars[i].style.height = h + 'px';
        bars[i].style.background = isSpeaking ? 'var(--acc)' : 'var(--pri-dim)';
      }
    }, 100);

    // --- Core logic adapted from original app.html ---
    const _authToken = sessionStorage.getItem('jarvis_token') || 'open_access';

    function _authHeader() { return { 'Authorization': `Bearer ${_authToken}` }; }
    function _authFetch(url, opts = {}) {
      opts.headers = Object.assign({}, opts.headers, _authHeader());
      return fetch(url, opts);
    }

    const feed = document.getElementById('chatFeed');
    const wake = document.getElementById('wake');
    const hudSt = document.getElementById('hudStatus');

    const _wsProto = location.protocol === 'https:' ? 'wss' : 'ws';
    const _wsUrl = `${_wsProto}://${location.host}/ws?token=${encodeURIComponent(_authToken)}`;
    const ws = new WebSocket(_wsUrl);

    ws.onopen = () => { sys('SYS: JARVIS online.'); toast('Conectado ao JARVIS'); };
    ws.onclose = () => sys('SYS: Connection lost.');
    ws.onerror = () => sys('SYS: Connection error.');
    ws.onmessage = (e) => {
      const m = JSON.parse(e.data);
      if (m.type === 'log') {
        append(m.speaker, m.text, m.cloud);
        if (m.speaker === 'jarvis' && window.speechSynthesis) {
          speechSynthesis.cancel();
          const u = new SpeechSynthesisUtterance(m.text);
          u.lang = 'pt-BR'; u.rate = 1.05;
          speechSynthesis.speak(u);
        }
      }
      if (m.type === 'status') setStatus(m.state);
      if (m.type === 'wake') sys('SYS: Wake signal detected...');
      if (m.type === 'sys') sys('SYS: ' + m.text);
      if (m.type === 'metrics') updateMetricsUI(m);
    };

    function setStatus(s) {
      isSpeaking = false;
      if (s === 'active') { hudSt.textContent = '● ATIVO'; hudSt.className='hud-status listening'; }
      else if (s === 'cloud_idle') { hudSt.textContent = '☁ CLOUD'; hudSt.className='hud-status listening'; }
      else if (s === 'thinking') { hudSt.textContent = '◈ PENSANDO'; hudSt.className='hud-status thinking'; }
      else if (s === 'speaking' || s === 'SPEAKING') { hudSt.textContent = '● SPEAKING'; hudSt.className='hud-status'; isSpeaking=true; }
      else { hudSt.textContent = '○ EM ESPERA'; hudSt.className='hud-status'; }
    }

    function append(speaker, text, isCloud) {
      const d = document.createElement('div');
      d.className = 'msg ' + (speaker === 'jarvis' ? 'msg-j' : 'msg-u');
      d.textContent = (speaker === 'jarvis' ? 'Jarvis: ' : 'Você: ') + text;
      feed.appendChild(d);
      feed.scrollTop = feed.scrollHeight;
    }

    function sys(text) {
      const d = document.createElement('div');
      d.className = 'msg msg-sys'; d.textContent = text;
      feed.appendChild(d); feed.scrollTop = feed.scrollHeight;
    }

    function toast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2800);
    }

    function doSend() {
      const inp = document.getElementById('inp');
      const txt = inp.value.trim();
      if (!txt) return;
      inp.value = '';
      append('user', txt);
      _authFetch('/api/command', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: txt })
      });
    }

    function doWake() {
      sys('SYS: Sending wake signal...');
      _authFetch('/api/wake', { method: 'POST' });
    }

    document.getElementById('inp').addEventListener('keydown', e => {
      if (e.key === 'Enter') doSend();
    });

    // Voice
    const micBtn = document.getElementById('mic-btn');
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    let isListening = false;
    if (SpeechRecognition) {
      recognition = new SpeechRecognition();
      recognition.lang = 'pt-BR';
      recognition.onstart = () => { isListening = true; micBtn.textContent = '⏹ STOP RECORDING'; toast('🎤 Ouvindo'); };
      recognition.onresult = (e) => { const t = e.results[0][0].transcript; if(t){ document.getElementById('inp').value=t; doSend(); } };
      recognition.onerror = (e) => { sys('SYS: Mic error ' + e.error); _micIdle(); };
      recognition.onend = () => _micIdle();
    }
    function _micIdle() { isListening = false; micBtn.textContent = '🎤 MICROPHONE'; }
    function doMic() {
      if (!recognition) return toast('Voz não suportada.');
      if (isListening) recognition.stop(); else recognition.start();
    }

    // Metrics
    function updateMetricsUI(d) {
      if(d.cpu_percent !== undefined) {
        document.getElementById('cpuVal').textContent = d.cpu_percent + '%';
        document.getElementById('cpuBar').style.width = d.cpu_percent + '%';
        document.getElementById('cpuVal').style.color = d.cpu_percent > 80 ? 'var(--red)' : 'var(--pri)';
        document.getElementById('cpuBar').style.background = d.cpu_percent > 80 ? 'var(--red)' : 'var(--pri)';
      }
      if(d.ram_percent !== undefined) {
        document.getElementById('ramVal').textContent = d.ram_percent + '%';
        document.getElementById('ramBar').style.width = d.ram_percent + '%';
        document.getElementById('ramVal').style.color = d.ram_percent > 80 ? 'var(--red)' : 'var(--pri)';
        document.getElementById('ramBar').style.background = d.ram_percent > 80 ? 'var(--red)' : 'var(--pri)';
      }
      if(d.gpu_percent !== undefined && d.gpu_percent !== null) {
        document.getElementById('gpuVal').textContent = d.gpu_percent + '%';
        document.getElementById('gpuBar').style.width = d.gpu_percent + '%';
      }
      if(d.cpu_temp_c) document.getElementById('cpuTemp').textContent = d.cpu_temp_c + '°C';
      if(d.process_count) document.getElementById('procVal').textContent = d.process_count;
      if(d.uptime) document.getElementById('uptimeVal').textContent = d.uptime;
    }
    setInterval(async () => {
      try {
        const r = await _authFetch('/api/metrics');
        const d = await r.json();
        updateMetricsUI(d);
      } catch(e) {}
    }, 5000);

    // File Upload
    document.getElementById('file-inp').addEventListener('change', function () {
      Array.from(this.files).forEach(f => {
        toast('Uploading ' + f.name);
        const fd = new FormData(); fd.append('file', f);
        const xhr = new XMLHttpRequest();
        xhr.open('POST', '/api/upload');
        xhr.setRequestHeader('Authorization', `Bearer ${_authToken}`);
        xhr.onload = () => { if(xhr.status === 200) sys('SYS: Uploaded ' + f.name); else sys('SYS: Upload error'); };
        xhr.send(fd);
      });
      this.value = '';
    });
    
    // Remote
    async function doControl(action) {
      await _authFetch('/api/control', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: action })
      });
      toast('✓ ' + action);
    }
  </script>
</body>
</html>
